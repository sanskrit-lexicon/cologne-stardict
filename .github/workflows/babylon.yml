name: Generate Babylon Dictionary

on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Install stardict-tools
      run: |
        sudo apt update
        sudo apt install -y stardict-tools
    
    - name: Test babylon file
      run: |
        babylon production/snp.babylon stardict/
    
    - name: Show stardict folder contents
      run: |
        ls -la stardict/